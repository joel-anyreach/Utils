name: Weekly Instantly Report

on:
  schedule:
    - cron: '0 16 * * 1,5'  # 8AM PST (UTC-8) = 16:00 UTC, Mon & Fri
  workflow_dispatch:          # allows manual run from GitHub UI

jobs:
  post-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: slack-posting/package-lock.json

      - name: Install dependencies
        working-directory: slack-posting
        run: npm ci

      - name: Run weekly report
        env:
          INSTANTLY_API_KEY: ${{ secrets.INSTANTLY_API_KEY }}
          SLACK_BOT_TOKEN:   ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID:  ${{ secrets.SLACK_CHANNEL_ID }}
        working-directory: slack-posting
        run: node run-once.js
